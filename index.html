<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Languaje Encripter</title>
        <link rel="stylesheet" href="index.css">
        <link rel="icon" type="image/png" href="https://i.imgur.com/7jNS5s6.png">
        <head>
</head>
    </head>
    <body>
        <script src="index.js"></script>
        <h1 class="letra1" >Encriptador de Textos</h1>
        <textarea rows="5" cols="40" id="textos"></textarea><br>
        <p></p>
        <button ondblclick="BIN()" class="button1">Binario</button>
        <button ondblclick="MORS()" class="button2">Morse</button>
        <button ondblclick="SUPER()" class="button3">Super</button>
        <button ondblclick="DesBIN()" class="button1">Des-Comprimir Binario</button>
        <button onclick="CLEAR()" class="button1">Limpiar Salida</button><br>
        <button onclick="iniciar()" class="button4">Iniciar sistema</button>
        <button onclick="generarBit()" class="button4">Generar bit</button>
        <div>
            <h1 class="letra2" >Binario: </h1><br>
            <h2 id="TEXT1" class="letra2" ></h2>
        </div><br>
        <div>
            <h1 class="letra2" >Morse: </h1><br>
            <h2 id="TEXT2" class="letra2" ></h2>
        </div><br>
        <div>
            <h1 class="letra2" >Super: </h1><br>
            <h2 id="TEXT3" class="letra2" ></h2>
        </div>

        <p id="bitGenerado" class="OUT"></p>
        <p id="bitDetectado" class="OUT"></p>

        <img src="https://i.imgur.com/oDFOm0o.png" class="IMG">

       <button class="SPACE" ondblclick="REDIRECT()">¿Por qué bajaste tanto?</button>
    </body>
</html>
